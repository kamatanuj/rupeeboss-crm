<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RupeeBoss CRM - Lead Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%); 
            min-height: 100vh; 
            color: #fff;
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 15px; 
        }
        
        h1 { 
            text-align: center; 
            padding: 20px 0; 
            color: #f59e0b; 
            font-size: 1.8em;
        }
        
        .stats { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; 
            margin-bottom: 20px; 
            padding: 0 5px;
        }
        
        .stat { 
            background: rgba(255,255,255,0.1); 
            padding: 15px 10px; 
            border-radius: 12px; 
            text-align: center; 
            min-width: 0;
        }
        
        .stat-value { 
            font-size: 1.8em; 
            font-weight: bold; 
        }
        
        .stat-label { 
            color: #aaa; 
            margin-top: 3px; 
            font-size: 0.8em; 
        }
        
        .stat-hot .stat-value { color: #10b981; }
        .stat-cold .stat-value { color: #6b7280; }
        .stat-email .stat-value { color: #f59e0b; }
        
        .note { 
            background: rgba(245, 158, 11, 0.1); 
            padding: 10px 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            color: #f59e0b; 
            text-align: center; 
            font-size: 0.85em; 
        }
        
        .filter-btns { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
            padding: 0 5px;
        }
        
        .filter-btn { 
            padding: 8px 14px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        
        .filter-btn.active { 
            background: rgba(245, 158, 11, 0.5); 
        }
        
        .filter-btn:hover { 
            background: rgba(255,255,255,0.2); 
        }
        
        .search-box { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 15px; 
            margin-bottom: 15px;
            -webkit-appearance: none;
        }
        
        .search-box::placeholder { 
            color: #888; 
        }
        
        .lead-card { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 12px; 
            transition: all 0.2s; 
        }
        
        .lead-card:hover { 
            background: rgba(255,255,255,0.1); 
        }
        
        .lead-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 10px; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        
        .lead-name { 
            font-size: 1.1em; 
            font-weight: 600; 
            color: #fff; 
        }
        
        .lead-info { 
            font-size: 0.85em; 
            color: #888; 
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        
        .lead-info span { 
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .lead-info a { 
            color: #06b6d4; 
            text-decoration: none; 
        }
        
        .lead-info a:hover { 
            text-decoration: underline; 
        }
        
        .convo-title { 
            font-size: 0.85em; 
            color: #f59e0b; 
            margin-top: 6px;
            word-break: break-word;
        }
        
        .badge { 
            display: inline-block; 
            padding: 4px 10px; 
            border-radius: 15px; 
            font-size: 11px; 
            font-weight: 600; 
            white-space: nowrap;
        }
        
        .badge-hot { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-cold { background: rgba(107, 114, 128, 0.2); color: #6b7280; }
        .badge-email { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .btn-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 10px; 
            flex-wrap: wrap; 
        }
        
        .btn-expand { 
            flex: 1; 
            min-width: 120px; 
            padding: 10px 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            border: none; 
            font-size: 13px; 
            transition: all 0.2s;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-expand.summary { 
            background: rgba(245, 158, 11, 0.2); 
            color: #f59e0b; 
        }
        
        .btn-expand.summary:hover { 
            background: rgba(245, 158, 11, 0.4); 
        }
        
        .btn-expand.transcript { 
            background: rgba(139, 92, 246, 0.2); 
            color: #a78bfa; 
        }
        
        .btn-expand.transcript:hover { 
            background: rgba(139, 92, 246, 0.4); 
        }
        
        .btn-delete { 
            padding: 10px 12px; 
            border-radius: 8px; 
            border: none; 
            background: rgba(239, 68, 68, 0.2); 
            color: #ef4444; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.2s; 
            min-height: 44px; 
            display: none; 
        }
        
        .btn-delete.show { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .btn-delete:hover { 
            background: rgba(239, 68, 68, 0.4); 
        }
        
        .transcript-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .back-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: rgba(107, 114, 128, 0.3);
            color: #6b7280;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-height: 44px;
        }
        
        .back-btn:hover {
            background: rgba(107, 114, 128, 0.5);
        }
        
        .email-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-height: 44px;
        }
        
        .email-btn:hover {
            background: rgba(59, 130, 246, 0.5);
        }
        
        .section { 
            display: none; 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 8px; 
        }
        
        .section.show { 
            display: block; 
        }
        
        .section.summary { 
            background: rgba(245, 158, 11, 0.1); 
            border: 1px solid rgba(245, 158, 11, 0.3); 
        }
        
        .section.transcript { 
            background: rgba(139, 92, 246, 0.1); 
            border: 1px solid rgba(139, 92, 246, 0.3); 
        }
        
        .section-header { 
            font-weight: 600; 
            margin-bottom: 10px; 
            font-size: 0.9em; 
        }
        
        .summary .section-header { 
            color: #f59e0b; 
        }
        
        .transcript .section-header { 
            color: #a78bfa; 
        }
        
        .section-content { 
            font-size: 0.9em; 
            line-height: 1.6; 
            color: #ddd; 
            max-height: 300px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            word-break: break-word;
        }
        
        .back-btn { 
            display: none; 
            padding: 10px 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            margin-top: 15px;
            min-height: 44px;
            font-size: 14px;
        }
        
        .back-btn.show { 
            display: inline-flex; 
            align-items: center;
            gap: 5px;
        }
        
        .pagination { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 6px; 
            margin-top: 25px; 
            flex-wrap: wrap;
            padding: 0 5px;
        }
        
        .page-btn { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 13px; 
            transition: all 0.2s;
            min-height: 40px;
            min-width: 40px;
        }
        
        .page-btn:hover:not(:disabled) { 
            background: rgba(255,255,255,0.2); 
        }
        
        .page-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }
        
        .page-btn.active { 
            background: rgba(245, 158, 11, 0.5); 
        }
        
        .page-info { 
            color: #888; 
            font-size: 14px; 
            margin: 15px 0; 
            text-align: center; 
        }
        
        .last-updated { 
            text-align: center; 
            color: #666; 
            padding: 15px; 
            font-size: 13px; 
        }
        
        .leads-container { 
            display: grid; 
            gap: 12px; 
        }
        
        /* Login Modal Styles */
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .login-modal.show {
            display: flex;
        }
        
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #f59e0b;
        }
        
        .login-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            -webkit-appearance: none;
        }
        
        .login-input::placeholder {
            color: #888;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(245, 158, 11, 0.5);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }
        
        .login-btn:hover {
            background: rgba(245, 158, 11, 0.7);
        }
        
        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }
        
        .login-error.show {
            display: block;
        }
        
        .user-info {
            position: absolute;
            top: 15px;
            right: 15px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .user-info.show {
            display: flex;
        }
        
        .logout-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 15px;
            background: rgba(239, 68, 68, 0.3);
            color: #ef4444;
            cursor: pointer;
            font-size: 0.85em;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.5);
        }
        
        .download-btn {
            display: none;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            cursor: pointer;
            margin: 15px auto;
            font-size: 14px;
        }
        
        .download-btn.show {
            display: block;
        }
        
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                font-size: 15px;
            }
            
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.5em;
                padding: 15px 0;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .stat {
                padding: 12px 8px;
            }
            
            .stat-value {
                font-size: 1.5em;
            }
            
            .stat-label {
                font-size: 0.75em;
            }
            
            .filter-btns {
                gap: 5px;
            }
            
            .filter-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            
            .lead-card {
                padding: 12px;
            }
            
            .lead-header {
                flex-direction: column;
                gap: 6px;
            }
            
            .lead-name {
                font-size: 1em;
            }
            
            .lead-info {
                font-size: 0.8em;
                flex-direction: column;
                gap: 4px;
            }
            
            .convo-title {
                font-size: 0.8em;
            }
            
            .badge {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .btn-row {
                flex-direction: column;
            }
            
            .btn-expand {
                min-width: 100%;
                font-size: 12px;
                padding: 12px;
            }
            
            .section {
                padding: 12px;
            }
            
            .section-content {
                font-size: 0.85em;
                max-height: 250px;
            }
            
            .pagination {
                gap: 4px;
            }
            
            .page-btn {
                padding: 6px 10px;
                font-size: 12px;
                min-height: 36px;
                min-width: 36px;
            }
        }
        
        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            
            .stat-value {
                font-size: 1.3em;
            }
            
            h1 {
                font-size: 1.3em;
            }
            
            .filter-btn {
                padding: 5px 10px;
                font-size: 10px;
            }
        }
        
        /* Fix for very small screens */
        @media (max-width: 360px) {
            .container {
                padding: 8px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>Login Required</h2>
            <input type="text" class="login-input" id="username" placeholder="Username" onkeypress="if(event.key==='Enter') login()">
            <input type="password" class="login-input" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
            <button class="login-btn" onclick="login()">Login</button>
            <div class="login-error" id="loginError">Invalid credentials!</div>
            <div style="color: #888; font-size: 0.8em; margin-top: 15px; text-align: center;">
                <div>Admin: admin / admin123</div>
                <div>User: user / user123</div>
            </div>
        </div>
    </div>
    
    <div class="user-info" id="userInfo">
        <span id="userRole"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="container" id="mainContainer" style="display: none;">

        </div>
        
        <button class="download-btn" id="downloadBtn" onclick="downloadJSON()">Download Updated JSON</button>
    </div>

irm कर दीजिए: क्या plot अभी identify हो चुका है, और उसके पास registry या sale deed available है या अभी process में है? और total budget या loan requirement पैंतालीस लाख ही रहेगा, या plot और construction separate amounts हैं?\nuser: दोनों separate account है और floor अभी खरीदना है।\nagent: समझ गई दीपक जी, आप बोल रहे हैं plot अभी खरीदना है और construction बाद में, और दोनों के लिए अलग अलग requirement रखना चाहते हैं. ऐसे में generally दो options fit बैठते हैं:...\nuser: मैं दोनों करके बता दूँगा।\nagent: ठीक है दीपक जी, आप दोनों amounts और details बता दीजिए. बस ये four चीजें send कर दीजिए: plot purchase के लिए कितना loan चाहिए, construction के लिए कितना loan चाहिए, plot की expected price कितनी है, और आपके पास down payment कितना available है. उसके बाद मैं आपको सबसे suitable loan structure बता दूँगी और EMI estimate भी निकाल दूँगी.\nuser: Plot और बनाने के लिए 45 लाख रुपए चाहिए। अभी मेरे पास चार लाख रुपए हैं।\nagent: \nagent: \nagent: ठीक है दीपक जी, total requirement पैंतालीस लाख और आपके पास four lakh down payment noted. Plot plus construction loan में lender usually total cost का कुछ हिस्सा margin रखता है, तो exact sanction plot value, estimate cost और docs पर depend करेगा; फिर भी हम feasibility check कर सकते हैं.\n\nEMI rough idea के लिए, अगर पैंतालीस लाख home loan rate सात point दो पांच percent onwards पर और tenure बीस साल लिया जाए, तो EMI करीब छत्तीस हज़ार से सैंतीस हज़ार per month के आसपास आएगी. आपकी current EMI पैंतीस हज़ार दो सौ इक्यावन already चल रही है, तो combined EMI काफी heavy हो सकती है, इसीलिए tenure increase या loan amount restructuring देखना पड़ेगा.\n\nNext step के लिए बस ये बता दीजिए: aapka current monthly EMI वाला loan किस type का है, और उसमें कितने साल बाकी हैं? और plot कौन से area में है, registry ready है या अभी pending?\nuser: Industry pending है और loan, personal loan है।\nagent: ठीक है दीपक जी, personal loan चल रहा है और “pending” noted, पर यहाँ मुझे दो clarifications चाहिए ताकि मैं सही guidance दे पाऊँ. “Industry pending” से आपका मतलब employment या company joining pending है, या plot की registry and approvals pending हैं? और personal loan में अभी कितने महीने या कितने...\nuser: Plot के registration pending है।\nagent: समझ गई दीपक जी, plot की registration pending है. Home loan या plot plus construction loan usually registry या at least agreement to sell, title documents, और clear land records के बिना proceed नहीं होता, क्योंकि bank को property as security चाहिए होती है; इसलिए पहले registration complete होना काफी important रहेगा.\n\nअब आप ये confirm कर दीजिए: plot resale है या new layout developer वाला? और expected registry date कब तक है? साथ ही क्या आप construction immediately start करेंगे या registration के बाद कुछ months later? इन details के आधार पर मैं आपको सही product option aur required documents की list बता दूँगी, और अगर चाहें तो personal loan का balance transfer या top up से EMI burden कम करने का option भी check करवा दूँगी.\nuser: हाँ, तो personal loan इसी में transfer हो सकता है।\nagent: हाँ दीपक जी, personal loan का balance transfer possible हो सकता है, अगर आपका existing personal loan high interest rate पर चल रहा है तो transfer करके EMI कम करने की कोशिश की जाती है. लेकिन exact saving निकालने के लिए मुझे तीन details चाहिए: आपका current personal loan का interest rate कितना है, remaining tenure कितने months का है, और outstanding amount करीब कितना बचा है?\n\nऔर एक और चीज: aapka naam aur phone number मेरे पास है, क्या मैं इसी number पर हमारे relationship manager से callback arrange कर दूँ ताकि वो balance transfer plus plot construction loan structure...\nuser: Yes.\nagent: ठीक है दीपक जी, मैं callback arrange कर देती हूँ इसी number पर. बस quickly बता दीजिए personal loan का current interest rate, remaining tenure, और approximate outstanding amount कितना है,...\nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \na यह details मिलते ही मैं आपकी eligibility और EMI estimate share कर दूँगी.\nuser: मेरी अभी present loan की EMI जा रही है 35,251 पे कट रही है। और मेरा credit score है 746.\nagent: ठीक है दीपक जी, credit score सात चार छह बहुत अच्छा है, और current EMI पैंतीस हज़ार दो सौ इक्यावन noted. अब home loan आगे बढ़ाने से पहले बस property details confirm कर दीजिए: property कौन से शहर में है, new purchase है या resale, और ready possession है या under construction? और approx property value कितनी है तथा down payment कितना plan है?\n\nये मिलते ही मैं आपको EMI estimate भी निकालकर बता दूँगी और best bank offers shortlist कर दूँगी.\nuser: तो...\nagent: दीपक जी,...\nuser: Property मुझे loan भी लेना है और construction भी करना है।दोनों का क्या होगा?\nagent: दीपक जी, अगर आपको property पर loan भी चाहिए और construction भी करना है, तो basically दो तरीके होते हैं. पहला, अगर plot या existing property आपके नाम पर है, तो Loan Against Property लिया जाता है और उसका use construction के लिए किया जा सकता है, इसमें rate आठ point दो पांच percent onwards रहता है. दूसरा, अगर आप home purchase plus construction कर रहे हैं, तो home loan में construction component add हो सकता है और disbursement stage wise होता है, rate सात point दो पांच percent onwards.\n\nBest option decide करने के लिए मुझे दो चीजें clear चाहिए: क्या land या existing house आपके नाम पर already है, और city कौन सी है? साथ ही total requirement पैंतालीस लाख ही है या purchase और construction मिलाकर अलग amount है?\nuser: हम्म। ज़िला बारां है और मुझे plot भी लेना है और construction भी करना है।\nagent: ...\nuser: Road record बनाना है।\nagent: ठीक है दीपक जी, ज़िला बारां noted. Plot purchase plus construction के case में generally construction linked home loan लिया जाता है, जिसमें amount stage wise release होता है, और rate सात point दो पांच percent onwards रह सकती है. “Road record” से आपका मतलब अगर land records जैसे पट्टा, खसरा, या registry related documents है, तो plot purchase और loan processing में ये documents important होते हैं.\n\nAap please ये confirm कर दीजिए: क्या plot अभी identify हो चुका है, और उसके पास registry या sale deed available है या अभी process में है? और total budget या loan requirement पैंतालीस लाख ही रहेगा, या plot और construction separate amounts हैं?\nuser: दोनों separate account है और floor अभी खरीदना है।\nagent: समझ गई दीपक जी, आप बोल रहे हैं plot अभी खरीदना है और construction बाद में, और दोनों के लिए अलग अलग requirement रखना चाहते हैं. ऐसे में generally दो options fit बैठते हैं:...\nuser: मैं दोनों करके बता दूँगा।\nagent: ठीक है दीपक जी, आप दोनों amounts और details बता दीजिए. बस ये four चीजें send कर दीजिए: plot purchase के लिए कितना loan चाहिए, construction के लिए कितना loan चाहिए, plot की expected price कितनी है, और आपके पास down payment कितना available है. उसके बाद मैं आपको सबसे suitable loan structure बता दूँगी और EMI estimate भी निकाल दूँगी.\nuser: Plot और बनाने के लिए 45 लाख रुपए चाहिए। अभी मेरे पास चार लाख रुपए हैं।\nagent: \nagent: \nagent: ठीक है दीपक जी, total requirement पैंतालीस लाख और आपके पास four lakh down payment noted. Plot plus construction loan में lender usually total cost का कुछ हिस्सा margin रखता है, तो exact sanction plot value, estimate cost और docs पर depend करेगा; फिर भी हम feasibility check कर सकते हैं.\n\nEMI rough idea के लिए, अगर पैंतालीस लाख home loan rate सात point दो पांच percent onwards पर और tenure बीस साल लिया जाए, तो EMI करीब छत्तीस हज़ार से सैंतीस हज़ार per month के आसपास आएगी. आपकी current EMI पैंतीस हज़ार दो सौ इक्यावन already चल रही है, तो combined EMI काफी heavy हो सकती है, इसीलिए tenure increase या loan amount restructuring देखना पड़ेगा.\n\nNext step के लिए बस ये बता दीजिए: aapka current monthly EMI वाला loan किस type का है, और उसमें कितने साल बाकी हैं? और plot कौन से area में है, registry ready है या अभी pending?\nuser: Industry pending है और loan, personal loan है।\nagent: ठीक है दीपक जी, personal loan चल रहा है और “pending” noted, पर यहाँ मुझे दो clarifications चाहिए ताकि मैं सही guidance दे पाऊँ. “Industry pending” से आपका मतलब employment या company joining pending है, या plot की registry and approvals pending हैं? और personal loan में अभी कितने महीने या कितने...\nuser: Plot के registration pending है।\nagent: समझ गई दीपक जी, plot की registration pending है. Home loan या plot plus construction loan usually registry या at least agreement to sell, title documents, और clear land records के बिना proceed नहीं होता, क्योंकि bank को property as security चाहिए होती है; इसलिए पहले registration complete होना काफी important रहेगा.\n\nअब आप ये confirm कर दीजिए: plot resale है या new layout developer वाला? और expected registry date कब तक है? साथ ही क्या आप construction immediately start करेंगे या registration के बाद कुछ months later? इन details के आधार पर मैं आपको सही product option aur required documents की list बता दूँगी, और अगर चाहें तो personal loan का balance transfer या top up से EMI burden कम करने का option भी check करवा दूँगी.\nuser: हाँ, तो personal loan इसी में transfer हो सकता है।\nagent: हाँ दीपक जी, personal loan का balance transfer possible हो सकता है, अगर आपका existing personal loan high interest rate पर चल रहा है तो transfer करके EMI कम करने की कोशिश की जाती है. लेकिन exact saving निकालने के लिए मुझे तीन details चाहिए: आपका current personal loan का interest rate कितना है, remaining tenure कितने months का है, और outstanding amount करीब कितना बचा है?\n\nऔर एक और चीज: aapka naam aur phone number मेरे पास है, क्या मैं इसी number पर हमारे relationship manager से callback arrange कर दूँ ताकि वो balance transfer plus plot construction loan structure...\nuser: Yes.\nagent: ठीक है दीपक जी, मैं callback arrange कर देती हूँ इसी number पर. बस quickly बता दीजिए personal loan का current interest rate, remaining tenure, और approximate outstanding amount कितना है,...\nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \na irm कर दीजिए: क्या plot अभी identify हो चुका है, और उसके पास registry या sale deed available है या अभी process में है? और total budget या loan requirement पैंतालीस लाख ही रहेगा, या plot और construction separate amounts हैं?\nuser: दोनों separate account है और floor अभी खरीदना है।\nagent: समझ गई दीपक जी, आप बोल रहे हैं plot अभी खरीदना है और construction बाद में, और दोनों के लिए अलग अलग requirement रखना चाहते हैं. ऐसे में generally दो options fit बैठते हैं:...\nuser: मैं दोनों करके बता दूँगा।\nagent: ठीक है दीपक जी, आप दोनों amounts और details बता दीजिए. बस ये four चीजें send कर दीजिए: plot purchase के लिए कितना loan चाहिए, construction के लिए कितना loan चाहिए, plot की expected price कितनी है, और आपके पास down payment कितना available है. उसके बाद मैं आपको सबसे suitable loan structure बता दूँगी और EMI estimate भी निकाल दूँगी.\nuser: Plot और बनाने के लिए 45 लाख रुपए चाहिए। अभी मेरे पास चार लाख रुपए हैं।\nagent: \nagent: \nagent: ठीक है दीपक जी, total requirement पैंतालीस लाख और आपके पास four lakh down payment noted. Plot plus construction loan में lender usually total cost का कुछ हिस्सा margin रखता है, तो exact sanction plot value, estimate cost और docs पर depend करेगा; फिर भी हम feasibility check कर सकते हैं.\n\nEMI rough idea के लिए, अगर पैंतालीस लाख home loan rate सात point दो पांच percent onwards पर और tenure बीस साल लिया जाए, तो EMI करीब छत्तीस हज़ार से सैंतीस हज़ार per month के आसपास आएगी. आपकी current EMI पैंतीस हज़ार दो सौ इक्यावन already चल रही है, तो combined EMI काफी heavy हो सकती है, इसीलिए tenure increase या loan amount restructuring देखना पड़ेगा.\n\nNext step के लिए बस ये बता दीजिए: aapka current monthly EMI वाला loan किस type का है, और उसमें कितने साल बाकी हैं? और plot कौन से area में है, registry ready है या अभी pending?\nuser: Industry pending है और loan, personal loan है।\nagent: ठीक है दीपक जी, personal loan चल रहा है और “pending” noted, पर यहाँ मुझे दो clarifications चाहिए ताकि मैं सही guidance दे पाऊँ. “Industry pending” से आपका मतलब employment या company joining pending है, या plot की registry and approvals pending हैं? और personal loan में अभी कितने महीने या कितने...\nuser: Plot के registration pending है।\nagent: समझ गई दीपक जी, plot की registration pending है. Home loan या plot plus construction loan usually registry या at least agreement to sell, title documents, और clear land records के बिना proceed नहीं होता, क्योंकि bank को property as security चाहिए होती है; इसलिए पहले registration complete होना काफी important रहेगा.\n\nअब आप ये confirm कर दीजिए: plot resale है या new layout developer वाला? और expected registry date कब तक है? साथ ही क्या आप construction immediately start करेंगे या registration के बाद कुछ months later? इन details के आधार पर मैं आपको सही product option aur required documents की list बता दूँगी, और अगर चाहें तो personal loan का balance transfer या top up से EMI burden कम करने का option भी check करवा दूँगी.\nuser: हाँ, तो personal loan इसी में transfer हो सकता है।\nagent: हाँ दीपक जी, personal loan का balance transfer possible हो सकता है, अगर आपका existing personal loan high interest rate पर चल रहा है तो transfer करके EMI कम करने की कोशिश की जाती है. लेकिन exact saving निकालने के लिए मुझे तीन details चाहिए: आपका current personal loan का interest rate कितना है, remaining tenure कितने months का है, और outstanding amount करीब कितना बचा है?\n\nऔर एक और चीज: aapka naam aur phone number मेरे पास है, क्या मैं इसी number पर हमारे relationship manager से callback arrange कर दूँ ताकि वो balance transfer plus plot construction loan structure...\nuser: Yes.\nagent: ठीक है दीपक जी, मैं callback arrange कर देती हूँ इसी number पर. बस quickly बता दीजिए personal loan का current interest rate, remaining tenure, और approximate outstanding amount कितना है,...\nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \nagent: \na     "transcript": "agent: Hi, I'm Riya from RupeeBoss Support. How can I help you today?\nuser: How can I apply for a business loan for the new restaurant?\nagent: That's great to hear! To help you apply for a business loan for your new restaurant, I'll need to collect a few details. Could you please share your name and cell phone number? This will help us keep you updated on the loan process and upcoming schemes. \n\nAlso, could you let me know if your restaurant is a proprietorship, partnership, or a private limited company? This will help me guide you better.\nuser: Okay, my name is Satya. Mobile number nine one eight two seven one three four three zero. And restaurant is proprietorship.\nagent: Thank you, Satya! I've noted your details: your name is Satya, and your mobile number is nine one eight two seven one three four three zero. I'll make sure to keep you updated on the loan process and any upcoming schemes.\n\nSince your restaurant is a proprietorship, you'll be eligible for an Unsecured Business Loan. Here are the key details:\n- Loan amount: ₹5 lakhs to ₹7 crores\n- Interest rate: 15.99% to 19% (depending on the loan amount)\n- Tenure: 12 to 36 months\n- Minimum income: ₹50 lakhs turnover and ₹5 lakhs net profit or more\n- Credit score: 680 or above\n\nTo proceed, we’ll need the following documents:\n1. KYC documents: PAN Card, Aadhaar Card, photo, and office address proof (rent agreement if rented, ownership proof if owned)\n2. Business KYC: Business license and GST certificate\n3. Income documents: Last 2 years' ITR with financials and audit reports, plus current year sales figures\n4. Bank statements: Last 12 months of business banking account statements\n5. GST returns: Last 12 months\n6. Loan documents: Any existing loan sanction letters or SOA (if applicable)\n\nWould you like me to guide you through the next steps or help you check your eligibility further?\nuser: What if GST is new registered?\nagent: Great question, Satya! If your GST registration is new, don’t worry — we can still proceed with your loan application. Since GST is a relatively recent registration, we’ll focus on other strong financial indicators to assess your eligibility.\n\nHere’s what we’ll consider:\n- Your business turnover and net profit from the past 2 years (even if GST is new, we can use your ITRs and business bank statements to verify this)\n- Your credit score (680 or above is preferred)\n- Your business’s operational history (minimum 2 years of business experience is ideal, but we can explore options if you’re newer)\n\nFor your new GST registration, we’ll need:\n- Your GST certificate\n- Last 12 months of GST returns (even if recent, we can work with them)\n- Business bank statements (last 12 months) to show consistent cash flow\n\nIf you’ve been operating for less than 2 years, we may also consider your business plan, projected income, and any prior financial records to strengthen your application.\n\nWould you like me to help you check if you meet the minimum turnover and profit criteria based on your current business performance?\nuser: Okay, but what if the business is new? It's like one month old.\nagent: Thank you for sharing that, Satya. If your restaurant is only one month old, we can still explore options, but the process will be a bit different since you don’t yet have a full year of financial history.\n\nFor a brand-new business like yours, we recommend considering the Unsecured Business Loan for Self-Employed — and we’ll focus on your business plan, projected income, and personal financial strength to support your application.\n\nHere’s what we’ll need:\n- Your PAN Card, Aadhaar Card, and photo (KYC)\n- Business license and GST registration (you already have this!)\n- A detailed business plan (including projected revenue, expenses, and how you’ll use the loan)\n- Your personal bank statements (last 6 months) to show financial stability\n- Your credit score (680 or above is preferred)\n\nSince your business is new, we’ll also consider:\n- Your experience in the restaurant or food industry\n- Your personal income and credit history\n- The location and potential of your restaurant\n\nWe can also explore MSME Bharat Manch, a national initiative by RupeeBoss that supports new entrepreneurs with mentorship, access to government schemes, and financial guidance — perfect for new businesses like yours.\n\nWould you like me to help you prepare a quick business plan or guide you on how to strengthen your application with the documents you have?\nuser: I'll get back to you later. Please do update me on WhatsApp.\nagent: Of course, Satya! I’ll make sure to send you updates on WhatsApp as soon as there’s any new information or if we have upcoming loan schemes that match your needs.  \n\nJust to confirm, I’ll be reaching out to you on the number you shared: nine one eight two seven one three four three zero.  \n\nFeel free to reach out anytime — I’m here to help when you’re ready. Have a great day!  \n\n[End of conversation]",

    "transcript": "agent: Hi, I'm Riya from RupeeBoss Support. How can I help you today?\nuser: Yeah, hello Riya. I want a loan of 20 lakhs. Can you please guide me which banks will process it faster?\nagent: Hi there! I'd be happy to help you with your loan of 20 lakhs. Could you please share your name and cell phone number so I can assist you better and keep you updated on the upcoming loan schemes?\nuser: Yes, I'm Swapna Lee and my cell number is 12345678910.\nagent: Thank you, Swapna! I've noted your details. For a loan of 20 lakhs, we have several options like Personal Loans, Business Loans, or even a Loan Against Property, depending on your needs. Could you let me know if this is for personal use, business, or property-related? That way, I can guide you to the best-suited option with faster processing.\nuser: Yes Riya, I want a business loan of 20 lakhs. Right now, I'm just a new venture. I'm a sole proprietor. Can you please guide me?\nagent: Great, Swapna! For a new sole proprietorship business loan of 20 lakhs, we offer an Unsecured Business Loan with a loan amount up to 7 crores. Since you're a new venture, we’ll need to check your business turnover, net profit, and credit score. Typically, we look for a minimum turnover of 50 lakhs and a net profit of 5 lakhs or more, along with a credit score of 680 or above.  \n\nCould you please share your business turnover and net profit figures so I can check your eligibility? Also, do you have your GST and ITR...\nuser: Yeah but yes but right now I do not have any turnover because this is a new venture I've just started\nagent: Thank you for sharing that, Swapna. Since you're a new venture with no turnover yet, we can still explore options like the CGTMSE Loan, which is designed for new entrepreneurs and doesn’t require collateral or third-party guarantees. It’s a great way to get funding for your startup with government-backed support.\n\nI’ll need your PAN, Aadhaar, and business registration details to proceed. Would you like me to guide you through the next steps to apply for this loan?\nuser: Yeah, it's good, nice to know that but what is the minimum amount I can apply for?\nagent: That’s a great question, Swapna! For the CGTMSE Loan, the minimum loan amount you can apply for is ₹ 50,000. Since you're looking for ₹ 20 lakhs, you’re well within the eligible range. This loan is especially helpful for new entrepreneurs like you, as it supports startups with minimal documentation and no collateral.\n\nI can help you start the application process right away—just let me know if you’d like to proceed!\nuser: Oh, that's good. There's no collateral. I'm really, I was really worried about it\nagent: I completely understand, Swapna! No collateral is a big relief, especially for new entrepreneurs. That’s one of the great benefits of the CGTMSE Loan—it’s designed to support startups like yours without the stress of pledging assets.\n\nI’ll help you get started with the application. Could you please confirm your business name and the type of business you’re running? This will help me guide you through the next steps smoothly.",
    "summary": "Swapna contacted Riya from RupeeBoss Support to inquire about a 20 lakh business loan. Swapna is a sole proprietor with a new venture and no current turnover. Riya suggested a CGTMSE Loan, which doesn't require collateral and is designed for new entrepreneurs. The minimum loan amount is ₹50,000. Riya offered to guide Swapna through the application process, requesting business name and type.",
    "title": "Business Loan Inquiry: CGTMSE"
  },

    "transcript": "agent: Hi, I'm Riya from RupeeBoss Support. How can I help you today?\nuser: Yeah, your line is disconnected.\nagent: I apologize for the inconvenience. Could you please confirm if you are still experiencing issues with the connection? If so, could you provide your name and cell phone number so I can investigate this further?\nuser: Sandeep. 859-555-2010.\nagent: Thank you, Sandeep. I'll look into the connection issue right away. In the meantime, is there anything else I can assist you with regarding our loan products or services?\nuser: Yes, please share what you need details like documents we have to complete for that\nagent: Okay, I can definitely help you with that! To provide you with the most accurate information, could you please specify which type of loan you're interested in?\nuser: Working capital.\nagent: Great! For a working capital loan, you'll...\nuser: For a startup business.\nagent: Thank you for the clarification! For a working capital loan for a startup, the requirements may vary slightly.\n\nGenerally, you'll need: business registration documents, bank statements for the last twelve months, audited financial statements for the last two years, GST filings, and ITR.\n\nTo give you more specific details, could you tell me how long your business has been operational?\nuser: It will be operational on 1st of September\nagent: Thank you for the information. As the minimum business vintage for a working capital loan is one year of operational history, you would need to wait until after that period.\n\nIn the meantime, would you like me to provide information on any other loan products that might be a better fit for your current situation?\nuser: Yes please provide.\nagent: Okay! We have several loan options. We have Unsecured Business Loans, the CGTMSE Loan, and MSME Schemes and Subsidies. Would you like me to share details on any of those?\nuser: Yes MSME please.\nagent: The MSME Bharat Manch is a nationwide initiative by Rupeeboss to support Micro, Small, and Medium Enterprises. It provides a platform for MSMEs to access financial services, market connections, and tech solutions. It also focuses on helping underprivileged and women-led businesses through mentorship, government schemes, and skill development. Would you like more information?\nuser: Yeah, what type of documents need for applying?\nagent: Okay! To provide you with the most accurate information on the documents needed, could you clarify whether you're interested in the general MSME schemes or a specific type of loan under the MSME initiative?\nuser: General.",

    "title": "MSME loan documents needed"
  },

rietorship firms, you'll need to provide KYC documents ,...",

        // Hardcoded credentials (MVP - client-side only)
        const USERS = {
            'admin': { password: 'admin123', role: 'admin' },
            'user': { password: 'user123', role: 'user' }
        };
        
        // Check auth on load
        function checkAuth() {
            const saved = sessionStorage.getItem('crm_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showMainUI();
            } else {
                showLogin();
            }
        }
        
        function showLogin() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('userInfo').classList.remove('show');
        }
        
        function showMainUI() {
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('userInfo').classList.add('show');
            document.getElementById('userRole').textContent = currentUser.role.toUpperCase() + ' - RupeeBoss CRM';
            
            // Show/hide delete buttons based on role
            if (currentUser.role === 'admin') {
                document.querySelectorAll('.btn-delete').forEach(btn => btn.classList.add('show'));
                document.getElementById('downloadBtn').classList.add('show');
            }
            
            updateStats();
            renderTable();
        }
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            if (USERS[username] && USERS[username].password === password) {
                currentUser = { username, role: USERS[username].role };
                sessionStorage.setItem('crm_user', JSON.stringify(currentUser));
                errorEl.classList.remove('show');
                showMainUI();
            } else {
                errorEl.classList.add('show');
            }
        }
        
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('crm_user');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showLogin();
        }
        
        function updateStats() {
            const total = allData.length;
            const hot = allData.filter(r => r.category === 'HOT').length;
            const cold = allData.filter(r => r.category === 'COLD').length;
            const email = allData.filter(r => r.category === 'EMAIL_ONLY').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-hot').textContent = hot;
            document.getElementById('stat-cold').textContent = cold;
            document.getElementById('stat-email').textContent = email;
            
            document.getElementById('filter-all').textContent = total;
            document.getElementById('filter-hot').textContent = hot;
            document.getElementById('filter-cold').textContent = cold;
            document.getElementById('filter-email').textContent = email;
        }
        
        function setCategory(cat) {
            currentCategory = cat;
            currentPage = 1;
            expandedLead = null;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateStats();
            renderTable();
        }
        
        function handleSearch(query) {
            searchQuery = query.toLowerCase();
            currentPage = 1;
            expandedLead = null;
            renderTable();
        }
        
        function getFilteredData() {
            let filtered = allData;
            
            // Filter by category
            if (currentCategory !== 'all') {
                filtered = filtered.filter(r => r.category === currentCategory);
            }
            
            // Filter by search query
            if (searchQuery) {
                filtered = filtered.filter(r => {
                    const name = (r.name || '').toLowerCase();
                    const phone = String(r.phone).toLowerCase();
                    const title = (r.title || '').toLowerCase();
                    return name.includes(searchQuery) || phone.includes(searchQuery) || title.includes(searchQuery);
                });
            }
            
            return filtered;
        }
        
        function renderTable() {
            const filtered = getFilteredData();
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = filtered.slice(start, end);
            
            const container = document.getElementById('leads-container');
            container.innerHTML = '';
            
            if (pageData.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">No leads found</div>';
                return;
            }
            
            pageData.forEach(lead => {
                const leadId = lead.phone + '_' + lead.date;
                const hasTranscript = CONV_DATA[leadId] !== undefined;
                const title = hasTranscript ? CONV_DATA[leadId].title : '';
                
                const card = document.createElement('div');
                card.className = 'lead-card';
                card.setAttribute('data-lead-id', leadId);
                card.innerHTML = `
                    <div class="lead-header">
                        <div>
                            <div class="lead-name">${lead.name || 'Unknown'}</div>
                            <div class="lead-info">
                                <span>📞 <a href="tel:${lead.phone}" class="phone-link">${lead.phone}</a></span>
                                <span>📅 ${lead.date || 'N/A'}</span>
                            </div>
                            ${title ? `<div class="convo-title">💬 ${title}</div>` : ''}
                        </div>
                        <span class="badge badge-${lead.category.toLowerCase()}">${lead.category}</span>
                    </div>
                ${hasTranscript ? `
                    <div class="btn-row">
                        <button class="btn-expand summary" onclick="toggleSection('${leadId}', 'summary')">
                            View Summary
                        </button>
                        <button class="btn-expand transcript" onclick="toggleSection('${leadId}', 'transcript')">
                            View Transcript
                        </button>
                        <button class="btn-delete" onclick="deleteLead('${leadId}')">Delete</button>
                    </div>
                    <div class="section summary ${expandedLead === leadId + '_summary' ? 'show' : ''}" id="summary-${leadId}">
                        <div class="section-header">Summary</div>
                        <div class="section-content">${CONV_DATA[leadId].summary || 'No summary available.'}</div>
                    </div>
                    <div class="section transcript ${expandedLead === leadId + '_transcript' ? 'show' : ''}" id="transcript-${leadId}">
                        <div class="section-header">Transcript</div>
                        <div class="section-content">${CONV_DATA[leadId].transcript || 'No transcript available.'}</div>
                    </div>
                    ${expandedLead === leadId + '_transcript' ? `
                    <div class="transcript-actions">
                        <button class="back-btn" onclick="goBackToLeadList()">← Back to Leads List</button>
                        ${lead.date >= '2026-01-01' ? `<button class="email-btn" onclick="generateEmailFromTranscript('${leadId}')">📧 Generate Email Reply</button>` : ''}
                    </div>
                    ` : ''}
                ` : ''}
                `;
                container.appendChild(card);
            });
            
            // Update pagination
            renderPagination(filtered.length);
            
            // Restore scroll position if returning from expandable section
            if (savedLeadId && expandedLead && savedScrollPosition) {
                setTimeout(() => {
                    window.scrollTo(0, savedScrollPosition);
                    savedLeadId = null;
                    savedScrollPosition = 0;
                }, 100);
            }
        }
        
        function toggleSection(leadId, section) {
            if (expandedLead === leadId + '_' + section) {
                expandedLead = null;
            } else {
                savedScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
                savedLeadId = leadId;
                expandedLead = leadId + '_' + section;
            }
            renderTable();
        }
        
        function deleteLead(leadId) {
            if (!currentUser || currentUser.role !== 'admin') {
                alert('Only admin can delete leads!');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this lead?')) {
                return;
            }
            
            // Parse leadId to get phone and date
            const parts = leadId.split('_');
            const phone = parts[0];
            const date = parts[1];
            
            const index = allData.findIndex(r => String(r.phone) === phone && r.date === date);
            if (index > -1) {
                allData.splice(index, 1);
                updateStats();
                renderTable();
                alert('Lead deleted! Use "Download Updated JSON" to save changes.');
            }
        }
        
        function downloadJSON() {
            const data = { leads: allData, lastUpdated: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'rupeeboss_leads_updated.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function goBackToLeadList() {
            expandedLead = null;
            renderTable();
            // Restore scroll position
            setTimeout(() => {
                if (savedLeadId) {
                    const leadElement = document.querySelector(`[data-lead-id="${savedLeadId}"]`);
                    if (leadElement) {
                        leadElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, 100);
        }
        
        function generateEmailFromTranscript(leadId) {
            const parts = leadId.split('_');
            const phone = parts[0];
            const date = parts[1];
            
            // Check if date is from January 2026 onwards
            if (date < '2026-01-01') {
                alert('Email generation is only available for leads from January 2026 onwards.');
                return;
            }
            
            const lead = allData.find(r => String(r.phone) === phone && r.date === date);
            
            if (!lead) {
                alert('Lead not found!');
                return;
            }
            
            const conv = CONV_DATA[leadId];
            
            if (!conv || !conv.transcript) {
                alert('No transcript available for this lead!');
                return;
            }
            
            const name = lead.name || 'Customer';
            const topic = conv.title || 'our financial services';
            const phoneNum = lead.phone || '';
            
            // Phone verification line
            let phoneVerification = '';
            if (phoneNum) {
                phoneVerification = `\n\nWe have your contact number as ${phoneNum}. Please confirm if we can reach you on this number, or provide an alternative contact number.`;
            } else {
                phoneVerification = `\n\nWe don't have your contact number on file. Please provide your phone number and email address for follow-up.`;
            }
            
            // Generate topic-specific email reply based on transcript
            let emailReply = '';
            
            if (topic.toLowerCase().includes('business loan')) {
                emailReply = `Dear ${name},\n\nThank you for contacting RupeeBoss regarding Business Loan eligibility check.\n\nBased on our conversation, I understand you're looking for financing options for your business. Our business loan products offer competitive interest rates starting from 11.99% p.a., with loan amounts up to ₹50 lakhs and flexible repayment tenures up to 5 years.\n\nOur team will contact you within 24 hours to discuss your business profile, annual turnover requirements, and help you choose the best loan product. We'll also guide you through the documentation process including ITR, bank statements, and business proof.${phoneVerification}\n\nWhat type of business do you operate, and what loan amount are you considering? We're here to fuel your business growth.\n\nBest regards,\nSales Team\nRupeeBoss\n📧 sales@rupeeboss.com`;
            } else if (topic.toLowerCase().includes('home loan')) {
                emailReply = `Dear ${name},\n\nThank you for contacting RupeeBoss regarding Home Loan inquiry.\n\nBased on our conversation, I understand you're looking to purchase or construct a residential property. Our home loan products feature attractive interest rates from 8.5% p.a., loan amounts up to ₹5 crores, and repayment tenures up to 30 years.\n\nOur team will contact you within 24 hours to discuss your property details, income eligibility, and available tax benefits under Section 80C and 24(b). We'll also explain the documentation needed including property papers, income proof, and KYC documents.${phoneVerification}\n\nAre you looking for a loan against a specific property? We're here to make your home ownership dream come true.\n\nBest regards,\nSales Team\nRupeeBoss\n📧 sales@rupeeboss.com`;
            } else if (topic.toLowerCase().includes('personal loan')) {
                emailReply = `Dear ${name},\n\nThank you for contacting RupeeBoss regarding Personal Loan requirements.\n\nBased on our conversation, I understand you need quick personal financing for your immediate needs. Our personal loan products offer instant approval with interest rates from 10.99% p.a., loan amounts up to ₹25 lakhs, and tenures from 1 to 5 years with minimal documentation.\n\nOur team will contact you within 24 hours to discuss your income profile, employment type, and help you get the best personal loan offer. We'll explain the simple documentation process requiring only identity proof, address proof, and income statements.${phoneVerification}\n\nWhat is the purpose of the loan, and when do you need the funds? We're here to provide quick financial solutions.\n\nBest regards,\nSales Team\nRupeeBoss\n📧 sales@rupeeboss.com`;
            } else if (topic.toLowerCase().includes('loan against property')) {
                emailReply = `Dear ${name},\n\nThank you for contacting RupeeBoss regarding Loan Against Property (LAP).\n\nBased on our conversation, I understand you're looking to leverage your residential or commercial property for funding. Our LAP products offer loan amounts up to 60% of property value, interest rates from 9.5% p.a., and flexible repayment options up to 15 years.\n\nOur team will contact you within 24 hours to evaluate your property, discuss your income eligibility, and explain the entire process including property valuation, legal verification, and documentation requirements.${phoneVerification}\n\nWhat is the approximate value of your property, and what funding amount are you looking for? We're here to unlock your property's potential.\n\nBest regards,\nSales Team\nRupeeBoss\n📧 sales@rupeeboss.com`;
            } else {
                // Generic but personalized
                emailReply = `Dear ${name},\n\nThank you for contacting RupeeBoss regarding ${topic}.\n\nBased on our conversation, I've attached detailed information about our loan products relevant to your inquiry. We offer Home Loans, Business Loans, Personal Loans, and Loan Against Property with competitive interest rates and flexible repayment options.\n\nOur team will contact you within 24 hours to understand your specific requirements, assess your eligibility, and provide customized loan solutions with complete transparency on interest rates, processing fees, and documentation.${phoneVerification}\n\nWe appreciate your interest and look forward to helping you achieve your financial goals.\n\nBest regards,\nSales Team\nRupeeBoss\n📧 sales@rupeeboss.com`;
            }
            
            const subject = `Follow-up: ${topic} - RupeeBoss`;
            const body = encodeURIComponent(emailReply);
            const recipient = lead.email || '';
            
            if (recipient) {
                window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${body}`;
            } else {
                // Always show the email reply even without email
                alert(`Email Draft for ${name}\n\nSubject: ${subject}\n\n---\n\n${emailReply}\n\n---\n\nNote: No email address found. Please ask the customer for their email address during the follow-up call.`);
            }
        }
        
        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / PAGE_SIZE);
            const pagination = document.getElementById('pagination');
            const pageInfo = document.getElementById('page-info');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                pageInfo.textContent = '';
                return;
            }
            
            let html = '';
            
            // Previous button
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span style="color: #666;">...</span>';
                }
            }
            
            // Next button
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
            
            pagination.innerHTML = html;
            pageInfo.textContent = `Showing ${(currentPage - 1) * PAGE_SIZE + 1}-${Math.min(currentPage * PAGE_SIZE, totalItems)} of ${totalItems} leads`;
        }
        
        function goToPage(page) {
            if (page < 1 || page > Math.ceil(getFilteredData().length / PAGE_SIZE)) return;
            currentPage = page;
            expandedLead = null;
            renderTable();
            window.scrollTo(0, 0);
        }
        
        // Initialize
        checkAuth();
    </script>
