<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupeeboss CRM - Lead Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #F1F5F9; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #FFFFFF; }
        .header p { color: #94A3B8; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1E293B; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #2563EB; }
        .stat-label { color: #94A3B8; font-size: 0.9rem; }
        .lead-card { background: #1E293B; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 3px solid #2563EB; }
        .lead-name { font-size: 1.2rem; font-weight: bold; color: #F1F5F9; margin-bottom: 5px; }
        .lead-info { color: #94A3B8; font-size: 0.9rem; margin-bottom: 10px; }
        .lead-info span { margin-right: 15px; }
        .badge { padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }
        .badge-cold { background: rgba(14, 165, 233, 0.2); color: #0EA5E9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 Rupeeboss CRM</h1>
            <p>Lead management system powered by ElevenLabs extraction</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="namedLeads">0</div>
                <div class="stat-label">Leads with Names</div>
            </div>
        </div>
        
        <div id="leadsContainer"></div>
    </div>
    
    <script>
        let allData = [];
        
        async function loadData() {
            try {
                const resp = await fetch('dashboard_data.json?v=' + new Date().getTime());
                const data = await resp.json();
                allData = data.leads;
                updateStats();
                renderLeads();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }
        
        function updateStats() {
            const total = allData.length;
            const named = allData.filter(l => l.name && l.name !== 'Unknown').length;
            document.getElementById('totalLeads').textContent = total;
            document.getElementById('namedLeads').textContent = named;
        }
        
        function renderLeads() {
            const container = document.getElementById('leadsContainer');
            if (allData.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #64748B; padding: 50px;">No leads found.</p>';
                return;
            }
            
            container.innerHTML = allData.map((lead, idx) => `
                <div class="lead-card">
                    <div class="lead-name">${lead.name || 'Unknown'}</div>
                    <div class="lead-info">
                        ${lead.phone ? `<span>📱 <a href="tel:${lead.phone}" style="color: #F1F5F9; text-decoration: none;">${lead.phone}</a></span>` : ''}
                        ${lead.email ? `<span>✉️ ${lead.email}</span>` : ''}
                        <span>📅 ${lead.date || 'N/A'}</span>
                        <span>📞 ${lead.title || 'General Inquiry'}</span>
                    </div>
                    <div>
                        <span class="badge badge-cold">❄️ COLD</span>
                    </div>
                </div>
            `).join('');
        }
        
        loadData();
    </script>
</body>
</html>
